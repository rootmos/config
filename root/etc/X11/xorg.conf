Section "ServerLayout"
    Identifier     "Layout0"
    #Screen      0  "Screen1" 0 0
    Option         "Xinerama" "0"
    Inactive       "Device0"
EndSection

# intel

Section "Monitor"
    Identifier     "HDMI1"
    Option         "Primary" "true"
EndSection

Section "Monitor"
    Identifier     "HDMI2"
    Option         "LeftOf" "HDMI1"
EndSection


Section "Device"
    Identifier     "Device1"
    Driver         "intel"
    BusID	   "PCI:0:2:0"
EndSection

Section "Screen"
    Identifier     "Screen1"
    Device         "Device1"
    Monitor        "HDMI1"
EndSection

# nvidia

Section "Monitor"
    Identifier     "Monitor0"
    VendorName     "Unknown"
    ModelName      "Ancor Communications Inc VG248"
    HorizSync       30.0 - 160.0
    VertRefresh     50.0 - 150.0
    Option         "DPMS"
EndSection

Section "Device"
    Identifier     "Device0"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
    BoardName      "GeForce GTX 1070"
    BusID	   "PCI:1:0:0"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor0"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor0"
    DefaultDepth    24
    Option         "Stereo" "0"
    Option         "metamodes" "DVI-D-0: 1920x1080_144 +0+0, HDMI-1: nvidia-auto-select +1920+0 {ForceCompositionPipeline=On}, HDMI-0: nvidia-auto-select +1920+0 {ForceCompositionPipeline=On}"
    Option         "nvidiaXineramaInfo" "True"
    Option         "nvidiaXineramaInfoOverride" "1920x1080+0+0, 1920x1080+1920+0"
    Option         "SLI" "Off"
    Option         "MultiGPU" "Off"
    Option         "BaseMosaic" "off"
    SubSection     "Display"
        Depth       24
    EndSubSection
EndSection
